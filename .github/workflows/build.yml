name: Build JAR from source

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Compile Java files
      run: |
        mkdir -p build/classes
        find src -name "*.java" > sources.txt
        javac -d build/classes @sources.txt

    - name: Create JAR with main class
      run: |
        cd build/classes
        # ЗДЕСЬ ЗАМЕНИ "CrossSine" НА ИМЯ ТВОЕГО ГЛАВНОГО КЛАССА
        MAIN_CLASS="CrossSine"
        jar cvfe ../CrossSine.jar $MAIN_CLASS *
        cd ../..

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: CrossSine.jar
        path: build/CrossSine.jar
